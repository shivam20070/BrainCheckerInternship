<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Brain Checker тАФ Book Your Session</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* WhatsApp light palette */
  --wa-bg:#e5ddd5;
  --wa-bg-img:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b2a99a' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  --wa-header:#075e54;
  --wa-header-text:#fff;
  --wa-bubble-in:#fff;
  --wa-bubble-out:#d9fdd3;
  --wa-bubble-shadow:0 1px 2px rgba(0,0,0,.13);
  --wa-input-bg:#fff;
  --wa-input-border:#dfe5eb;
  --wa-footer:#f0f2f5;
  --wa-send:#075e54;
  --wa-tick:#53bdeb;
  --ink:#111b21;--ink2:#3b4a54;--ink3:#667781;--ink4:#8696a0;
  --teal:#075e54;--teal2:#128c7e;--teal3:#25d366;
  --border:#e9edef;
  --opt-bg:#f0f2f5;--opt-border:#d1d7db;--opt-sel:#d9fdd3;--opt-sel-border:#25d366;
}
[data-theme="dark"]{
  --wa-bg:#0d1418;
  --wa-bg-img:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  --wa-header:#1f2c34;
  --wa-bubble-in:#1f2c34;
  --wa-bubble-out:#005c4b;
  --wa-input-bg:#2a3942;
  --wa-input-border:#2a3942;
  --wa-footer:#1f2c34;
  --wa-send:#00a884;
  --ink:#e9edef;--ink2:#aebac1;--ink3:#8696a0;--ink4:#667781;
  --border:#2a3942;
  --opt-bg:#1f2c34;--opt-border:#2a3942;--opt-sel:#005c4b;--opt-sel-border:#00a884;
}

html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--wa-bg);background-image:var(--wa-bg-img);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

/* тФАтФА HEADER тФАтФА */
.wa-header{
  background:var(--wa-header);
  padding:0 16px;height:56px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  z-index:10;
}
.wa-back{color:rgba(255,255,255,.8);font-size:22px;text-decoration:none;line-height:1;}
.wa-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.wa-avatar img{width:100%;height:100%;object-fit:contain;background:#fff;border-radius:50%;}
.wa-hinfo{flex:1;}
.wa-hinfo .wn{font-size:15px;font-weight:700;color:#fff;line-height:1.2;}
.wa-hinfo .ws{font-size:12px;color:rgba(255,255,255,.7);}
.wa-hicons{display:flex;gap:18px;color:rgba(255,255,255,.8);}
.wa-hicons span{font-size:20px;cursor:pointer;}
.theme-btn{background:none;border:none;cursor:pointer;font-size:18px;color:rgba(255,255,255,.8);padding:0;}

/* тФАтФА CHAT AREA тФАтФА */
.chat-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 8px 4px;
  display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:6px;}
.chat-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:3px;}

/* тФАтФА DATE DIVIDER тФАтФА */
.date-divider{text-align:center;margin:8px 0;}
.date-divider span{background:var(--wa-bubble-in);color:var(--ink3);font-size:12px;font-weight:600;border-radius:8px;padding:4px 12px;box-shadow:var(--wa-bubble-shadow);}

/* тФАтФА BUBBLES тФАтФА */
.msg-row{display:flex;margin-bottom:2px;}
.msg-row.in{justify-content:flex-start;padding-right:60px;}
.msg-row.out{justify-content:flex-end;padding-left:60px;}

.bubble{
  max-width:100%;
  padding:7px 10px 6px;
  border-radius:8px;
  position:relative;
  box-shadow:var(--wa-bubble-shadow);
  animation:bubblePop .2s ease;
  word-break:break-word;
}
@keyframes bubblePop{from{opacity:0;transform:scale(.95)translateY(4px);}to{opacity:1;transform:none;}}
.bubble.in{background:var(--wa-bubble-in);border-top-left-radius:0;color:var(--ink);}
.bubble.out{background:var(--wa-bubble-out);border-top-right-radius:0;color:var(--ink);}

/* tail */
.bubble.in::before{content:'';position:absolute;top:0;left:-7px;border:7px solid transparent;border-top-color:var(--wa-bubble-in);border-right:none;}
.bubble.out::before{content:'';position:absolute;top:0;right:-7px;border:7px solid transparent;border-top-color:var(--wa-bubble-out);border-left:none;}

.bubble .b-text{font-size:14.5px;line-height:1.45;color:var(--ink);}
.bubble .b-text strong{font-weight:700;}
.bubble .b-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px;}
.bubble .b-time{font-size:11px;color:var(--ink4);}
.bubble .b-tick{font-size:12px;color:var(--wa-tick);}

/* typing */
.typing-bubble{background:var(--wa-bubble-in);padding:12px 16px;border-radius:8px;border-top-left-radius:0;display:flex;gap:4px;align-items:center;box-shadow:var(--wa-bubble-shadow);}
.typing-bubble span{width:8px;height:8px;background:var(--ink4);border-radius:50%;animation:tdot 1.2s infinite;}
.typing-bubble span:nth-child(2){animation-delay:.2s;}
.typing-bubble span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* тФАтФА QUICK REPLY OPTIONS тФАтФА */
.opts-row{display:flex;flex-wrap:wrap;gap:7px;padding:6px 8px 4px;justify-content:flex-end;animation:bubblePop .2s ease;}
.opt-btn{
  background:var(--opt-bg);border:1.5px solid var(--opt-border);
  border-radius:20px;padding:8px 16px;
  font-size:13.5px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--teal2);cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:6px;
}
.opt-btn:active{transform:scale(.96);}
.opt-btn:hover,.opt-btn.sel{background:var(--opt-sel);border-color:var(--opt-sel-border);color:var(--teal);}

/* тФАтФА INTERACTIVE CARDS тФАтФА */
.card-wrap{padding:4px 8px;width:100%;max-width:360px;animation:bubblePop .25s ease;}
.wa-card{background:var(--wa-bubble-in);border-radius:10px;overflow:hidden;box-shadow:var(--wa-bubble-shadow);}
.wa-card .wc-header{background:var(--teal);color:#fff;padding:10px 14px;font-size:13px;font-weight:700;}
.wa-card .wc-body{padding:12px 14px;}

/* category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.cat-item{border:2px solid var(--opt-border);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;transition:.18s;background:var(--opt-bg);}
.cat-item:hover,.cat-item.sel{border-color:var(--teal3);background:var(--opt-sel);}
.cat-item .ci-icon{font-size:26px;margin-bottom:6px;}
.cat-item .ci-name{font-size:12.5px;font-weight:700;color:var(--ink2);}
.cat-item .ci-sub{font-size:10px;color:var(--ink4);margin-top:2px;}

/* test list */
.test-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid var(--opt-border);border-radius:10px;cursor:pointer;transition:.18s;background:var(--opt-bg);margin-bottom:7px;}
.test-item:last-child{margin-bottom:0;}
.test-item:hover,.test-item.sel{border-color:var(--teal3);background:var(--opt-sel);}
.test-icon{width:36px;height:36px;border-radius:9px;background:rgba(18,140,126,.12);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.test-name{font-size:13px;font-weight:700;color:var(--ink2);}
.test-desc{font-size:11px;color:var(--ink4);margin-top:2px;}
.test-arrow{margin-left:auto;color:var(--ink4);font-size:18px;}

/* mode cards */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mode-item{border:2px solid var(--opt-border);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:.18s;background:var(--opt-bg);position:relative;}
.mode-item:hover,.mode-item.sel{border-color:var(--teal3);background:var(--opt-sel);}
.mode-item .mi-icon{font-size:30px;margin-bottom:8px;}
.mode-item .mi-name{font-size:14px;font-weight:800;color:var(--ink);}
.mode-item .mi-price{font-size:20px;font-weight:900;margin-top:4px;}
.mode-item.online .mi-price{color:var(--teal2);}
.mode-item.offline .mi-price{color:#25d366;}
.mode-item .mi-desc{font-size:11px;color:var(--ink3);margin-top:4px;line-height:1.4;}
.mode-item .mi-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;background:rgba(18,140,126,.12);color:var(--teal2);border-radius:20px;padding:2px 7px;}

/* date strip */
.date-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;}
.date-strip::-webkit-scrollbar{height:3px;}
.date-strip::-webkit-scrollbar-thumb{background:var(--opt-border);border-radius:3px;}
.dc{min-width:56px;border:2px solid var(--opt-border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:.18s;background:var(--opt-bg);flex-shrink:0;}
.dc:hover:not(.full),.dc.sel{border-color:var(--teal3);background:var(--opt-sel);}
.dc.full{opacity:.4;cursor:not-allowed;}
.dc .d-day{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;}
.dc .d-num{font-size:20px;font-weight:900;color:var(--ink);line-height:1.1;}
.dc .d-mon{font-size:10px;color:var(--ink3);}
.dc .d-cnt{font-size:9px;font-weight:700;margin-top:3px;color:#25d366;}
.dc.full .d-cnt{color:#ef4444;}

/* slot grid */
.slot-grid-wa{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.sc{border:2px solid var(--opt-border);border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;transition:.15s;font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--opt-bg);}
.sc:hover,.sc.sel{border-color:var(--teal3);background:var(--opt-sel);color:var(--teal);}

/* franchise list */
.fr-wa-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid var(--opt-border);border-radius:10px;cursor:pointer;transition:.18s;background:var(--opt-bg);margin-bottom:7px;}
.fr-wa-item:last-child{margin-bottom:0;}
.fr-wa-item:hover,.fr-wa-item.sel{border-color:var(--teal3);background:var(--opt-sel);}
.fr-wa-item.near{border-color:#f59e0b;background:#fef3c7;}
[data-theme="dark"] .fr-wa-item.near{background:rgba(245,158,11,.12);}
.fr-wa-item.near.sel{border-color:var(--teal3);background:var(--opt-sel);}
.fr-icon-wa{width:34px;height:34px;border-radius:9px;background:rgba(18,140,126,.12);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.fr-nm{font-size:13px;font-weight:700;color:var(--ink2);}
.fr-ad{font-size:11px;color:var(--ink4);margin-top:2px;}
.near-tag{font-size:9px;font-weight:700;color:#92400e;background:#fef3c7;border-radius:20px;padding:1px 6px;margin-left:5px;}
.fr-arr{margin-left:auto;color:var(--ink4);}

/* location bar */
.loc-bar{display:flex;align-items:center;gap:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:9px;padding:9px 12px;margin-bottom:8px;font-size:12.5px;color:#1e40af;}
[data-theme="dark"] .loc-bar{color:#93c5fd;}
.loc-bar .lb-btn{margin-left:auto;background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

/* payment */
.pay-grid-wa{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.pay-item{border:2px solid var(--opt-border);border-radius:9px;padding:12px 8px;text-align:center;cursor:pointer;background:var(--opt-bg);}
.pay-item:hover,.pay-item.sel{border-color:var(--teal3);background:var(--opt-sel);}
.pay-item .pi-icon{font-size:22px;margin-bottom:4px;}
.pay-item .pi-name{font-size:12px;font-weight:700;color:var(--ink2);}
.qr-section-wa{text-align:center;padding:8px 0;}
.qr-section-wa img{width:130px;height:130px;border-radius:10px;border:3px solid var(--border);object-fit:contain;}
.upi-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(18,140,126,.1);border:1px solid rgba(18,140,126,.2);border-radius:9px;padding:7px 12px;margin-top:8px;}
.upi-pill span{font-family:monospace;font-size:12px;color:var(--teal2);font-weight:700;}
.upi-pill button{background:none;border:none;cursor:pointer;font-size:13px;color:var(--teal2);}
.amt-row{display:flex;align-items:center;justify-content:space-between;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:9px;padding:10px 14px;margin-bottom:12px;}
.amt-row span{font-size:12px;color:var(--ink3);font-weight:600;}
.amt-row strong{font-size:20px;font-weight:900;color:#f59e0b;}

/* summary */
.sum-wa{display:flex;flex-direction:column;gap:0;}
.sr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.sr:last-child{border-bottom:none;}
.sr .sl{color:var(--ink3);font-weight:600;}
.sr .sv{font-weight:700;color:var(--ink);}
.sr .sv.g{color:#25d366;}
.sr .sv.t{color:var(--teal2);}

/* form fields inside card */
.field-wa{margin-bottom:12px;}
.field-wa label{display:block;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.field-wa input{width:100%;background:var(--wa-input-bg);border:1.5px solid var(--opt-border);border-radius:9px;padding:11px 13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);outline:none;transition:.2s;}
.field-wa input:focus{border-color:var(--teal3);}
.field-wa .err{font-size:11.5px;color:#ef4444;margin-top:4px;display:none;}
.field-wa.has-err input{border-color:#ef4444;}
.field-wa.has-err .err{display:block;}
.row2-wa{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* send button inside card */
.wa-send-btn{width:100%;background:var(--teal3);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;}
.wa-send-btn:hover{background:var(--teal2);}
.wa-send-btn:disabled{opacity:.5;cursor:not-allowed;}
.wa-back-btn{width:100%;background:none;border:1.5px solid var(--opt-border);border-radius:11px;padding:11px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;color:var(--ink2);cursor:pointer;margin-top:8px;}

/* confirm card */
.confirm-wa{text-align:center;padding:4px 0;}
.confirm-wa .ck-icon{font-size:48px;margin-bottom:10px;}
.confirm-wa h3{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px;}
.confirm-wa p{font-size:13px;color:var(--ink3);margin-bottom:16px;}
.meet-pill{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:12px;margin-bottom:10px;}
.meet-pill h4{font-size:12px;font-weight:700;color:#1e40af;margin-bottom:6px;}
[data-theme="dark"] .meet-pill h4{color:#93c5fd;}
.meet-pill .ml{font-family:monospace;font-size:11px;color:#3b82f6;word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:6px;background:var(--wa-bubble-in);border-radius:7px;padding:7px 10px;}
.meet-pill .ml button{background:none;border:none;cursor:pointer;font-size:13px;color:#3b82f6;flex-shrink:0;}
.join-wa-btn{width:100%;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13.5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;margin-top:8px;}
.venue-pill{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px;margin-bottom:10px;text-align:left;}
.venue-pill h4{font-size:12px;font-weight:700;color:#92400e;margin-bottom:6px;}
[data-theme="dark"] .venue-pill h4{color:#fbbf24;}
.venue-pill p{font-size:13px;color:var(--ink2);}
.share-wa-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.sh-wa{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;}
.sh-wa.wa{background:#25d366;color:#fff;}
.sh-mail{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#3b82f6;}
.new-book-btn{width:100%;background:none;border:2px solid var(--teal3);border-radius:10px;padding:11px;font-size:13.5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--teal2);cursor:pointer;margin-top:8px;}

/* тФАтФА FOOTER INPUT тФАтФА */
.wa-footer{
  background:var(--wa-footer);
  padding:8px 10px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  border-top:1px solid var(--border);
}
.wa-input-wrap{flex:1;display:flex;align-items:center;background:var(--wa-input-bg);border-radius:24px;padding:8px 14px;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.wa-input-wrap input{flex:1;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;background:transparent;color:var(--ink);}
.wa-input-wrap input::placeholder{color:var(--ink4);}
.emoji-btn{font-size:22px;cursor:pointer;color:var(--ink3);line-height:1;}
.send-fab{width:46px;height:46px;border-radius:50%;background:var(--wa-send);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2);flex-shrink:0;transition:.18s;}
.send-fab:active{transform:scale(.92);}
.send-fab svg{width:22px;height:22px;fill:#fff;}

/* Spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- тФАтФА WHATSAPP HEADER тФАтФА -->
<div class="wa-header">
  <a href="/" class="wa-back">тА╣</a>
  <div class="wa-avatar"><img src="/static/logo.png" alt="BC"/></div>
  <div class="wa-hinfo">
    <div class="wn">Brain Checker</div>
    <div class="ws" id="ws-status">ЁЯЯв Online тАФ ready to book</div>
  </div>
  <div class="wa-hicons">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">ЁЯМЩ</button>
    <a href="/admin/login" style="color:rgba(255,255,255,.8);font-size:18px;text-decoration:none;" title="Admin">ЁЯФР</a>
  </div>
</div>

<!-- тФАтФА CHAT AREA тФАтФА -->
<div class="chat-area" id="chat-area">
  <div class="date-divider"><span id="today-label">Today</span></div>
</div>

<!-- тФАтФА FOOTER тФАтФА -->
<div class="wa-footer">
  <div class="wa-input-wrap">
    <span class="emoji-btn">ЁЯШК</span>
    <input id="txt-input" placeholder="Type a message" autocomplete="off"/>
  </div>
  <button class="send-fab" onclick="sendText()" id="send-fab">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// тФАтФА STATE тФАтФА
const S={step:0,name:'',email:'',phone:'',city:'',category:'',test_name:'',mode:'',franchise_id:null,franchise_name:'',franchise_address:'',booking_date:'',slot_id:null,slot_time:'',payment_method:'UPI'};
const CA=document.getElementById('chat-area');
const TI=document.getElementById('txt-input');

let allFr=[], slotsByDate={}, allCats=[], allSvcs=[];
const FLOW=['profile','category','test','mode','schedule','confirm'];

// тФАтФА TIME тФАтФА
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// тФАтФА SCROLL тФАтФА
function scroll(){CA.scrollTop=CA.scrollHeight;}

// тФАтФА BOT MESSAGE тФАтФА
function botMsg(html, delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      const row=document.createElement('div'); row.className='msg-row in';
      row.innerHTML=`<div class="bubble in"><div class="b-text">${html}</div><div class="b-meta"><span class="b-time">${now()}</span></div></div>`;
      CA.appendChild(row); scroll(); res();
    },delay);
  });
}

// тФАтФА USER MESSAGE тФАтФА
function userMsg(text){
  const row=document.createElement('div'); row.className='msg-row out';
  row.innerHTML=`<div class="bubble out"><div class="b-text">${text}</div><div class="b-meta"><span class="b-time">${now()}</span><span class="b-tick">тЬУтЬУ</span></div></div>`;
  CA.appendChild(row); scroll();
}

// тФАтФА TYPING тФАтФА
function showTyping(){
  const d=document.createElement('div'); d.className='msg-row in'; d.id='typing';
  d.innerHTML='<div class="typing-bubble"><span></span><span></span><span></span></div>';
  CA.appendChild(d); scroll(); return d;
}
function hideTyping(){document.getElementById('typing')?.remove();}

// тФАтФА QUICK REPLY BUTTONS тФАтФА
function addOpts(opts, onSelect){
  const row=document.createElement('div'); row.className='opts-row';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='opt-btn';
    const label=o.label||o; const val=o.val||o;
    b.textContent=label;
    b.onclick=()=>{
      row.querySelectorAll('.opt-btn').forEach(x=>{x.disabled=true;x.style.opacity='.5';});
      b.classList.add('sel'); b.style.opacity='1';
      userMsg(label);
      setTimeout(()=>onSelect(val,label),100);
    };
    row.appendChild(b);
  });
  CA.appendChild(row); scroll();
}

// тФАтФА CARD WRAPPER тФАтФА (appears as incoming bubble)
function cardWrap(innerHTML, align='in'){
  const row=document.createElement('div'); row.className=`msg-row ${align}`;
  row.style.paddingRight='0';row.style.paddingLeft='0';
  const wrap=document.createElement('div'); wrap.className='card-wrap';
  wrap.innerHTML=innerHTML;
  row.appendChild(wrap); CA.appendChild(row); scroll();
  return wrap;
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 0 тАФ GREETING + PROFILE
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function startFlow(){
  document.getElementById('today-label').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  const t=showTyping();
  await new Promise(r=>setTimeout(r,800));
  t.remove();
  await botMsg('ЁЯСЛ Hi! I\'m the <strong>Brain Checker</strong> assistant.');
  await botMsg('I\'ll help you book your assessment session in a few quick steps. ЁЯза',400);
  await botMsg('First, please share your basic details below ЁЯСЗ',400);
  showProfileForm();
}

function showProfileForm(){
  cardWrap(`<div class="wa-card">
    <div class="wc-header">ЁЯУЛ Your Details</div>
    <div class="wc-body">
      <div class="row2-wa">
        <div class="field-wa" id="fw-name"><label>Full Name *</label><input id="inp-name" placeholder="e.g. Rahul Sharma" type="text"/><div class="err" id="err-name"></div></div>
        <div class="field-wa" id="fw-phone"><label>Mobile *</label><input id="inp-phone" placeholder="10-digit" type="tel"/><div class="err" id="err-phone"></div></div>
      </div>
      <div class="row2-wa">
        <div class="field-wa" id="fw-email"><label>Email *</label><input id="inp-email" placeholder="you@email.com" type="email"/><div class="err" id="err-email"></div></div>
        <div class="field-wa"><label>City</label><input id="inp-city" placeholder="Your city" type="text"/></div>
      </div>
      <button class="wa-send-btn" onclick="submitProfile()">Continue тЖТ</button>
    </div>
  </div>`);
}

function fErr(fw,ei,msg){document.getElementById(fw).classList.add('has-err');document.getElementById(ei).textContent=msg;}
function fOk(fw){document.getElementById(fw)?.classList.remove('has-err');}

async function submitProfile(){
  const n=document.getElementById('inp-name').value.trim();
  const p=document.getElementById('inp-phone').value.trim().replace(/\D/g,'');
  const e=document.getElementById('inp-email').value.trim();
  let ok=true;
  if(n.length<2||!/^[A-Za-z\s]+$/.test(n)){fErr('fw-name','err-name','Letters only, min 2 chars');ok=false;}else fOk('fw-name');
  if(!/^[6-9]\d{9}$/.test(p)){fErr('fw-phone','err-phone','Valid 10-digit Indian number');ok=false;}else fOk('fw-phone');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)){fErr('fw-email','err-email','Valid email required');ok=false;}else fOk('fw-email');
  if(!ok) return;
  S.name=n.replace(/\b\w/g,c=>c.toUpperCase()); S.phone=p; S.email=e; S.city=document.getElementById('inp-city').value.trim();
  // lock form
  document.querySelectorAll('.wa-card input,.wa-card .wa-send-btn').forEach(el=>{el.disabled=true;});
  userMsg(`${S.name} ┬╖ ${S.phone} ┬╖ ${S.email}`);
  const t=showTyping(); await new Promise(r=>setTimeout(r,600)); t.remove();
  await botMsg(`Great, <strong>${S.name}</strong>! ЁЯОЙ`);
  showCategoryStep();
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 1 тАФ CATEGORY
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showCategoryStep(){
  await botMsg('Who is this assessment for? ЁЯСЗ',300);
  const cats=allCats.length?allCats:[{name:'Student',icon:'ЁЯОУ',sub:'Age 6тАУ22'},{name:'Parent',icon:'ЁЯСитАНЁЯСйтАНЁЯСз',sub:'For your child'},{name:'Corporate',icon:'ЁЯТ╝',sub:'Professional'}];
  const items=cats.map(c=>`<div class="cat-item" onclick="pickCat('${c.name||c}',this)"><div class="ci-icon">${c.icon||'ЁЯУЛ'}</div><div class="ci-name">${c.name||c}</div><div class="ci-sub">${c.sub||''}</div></div>`).join('');
  cardWrap(`<div class="wa-card"><div class="wc-header">ЁЯУБ Select Category</div><div class="wc-body"><div class="cat-grid">${items}</div></div></div>`);
}

async function pickCat(cat, el){
  document.querySelectorAll('.cat-item').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.5';});
  el.style.opacity='1'; el.classList.add('sel');
  S.category=cat;
  userMsg(`${cat}`);
  const t=showTyping(); await new Promise(r=>setTimeout(r,500)); t.remove();
  showTestStep(cat);
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 2 тАФ TEST
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showTestStep(cat){
  await botMsg(`Select the assessment for <strong>${cat}</strong>:`,200);
  const testIconMap={'DMIT':'ЁЯзм','GET':'ЁЯУК','MET':'ЁЯОп','SAT':'тЪЩя╕П','MAT':'ЁЯУИ','GAT':'ЁЯФм'};
  // Use public API endpoint тАФ no auth required
  let svcs=[];
  try{
    const r=await fetch('/api/tests/'+encodeURIComponent(cat));
    const d=await r.json();
    svcs=d.tests||[];
  }catch(e){}
  // Hardcoded fallback if DB empty
  if(!svcs.length){
    const defaults={
      Student:[{name:'DMIT тАУ Dermatoglyphics Multiple Intelligence Test',code:'DMIT',description:'Fingerprint-based intelligence mapping',icon:'ЁЯзм'},{name:'GET тАУ General Evaluation Test',code:'GET',description:'Comprehensive skill evaluation',icon:'ЁЯУК'},{name:'MET тАУ Multiple Evaluation Test',code:'MET',description:'Multi-domain performance test',icon:'ЁЯОп'}],
      Parent:[{name:'DMIT тАУ Dermatoglyphics Multiple Intelligence Test',code:'DMIT',description:'Understand your child\'s potential',icon:'ЁЯзм'},{name:'GET тАУ General Evaluation Test',code:'GET',description:'General child assessment',icon:'ЁЯУК'},{name:'MET тАУ Multiple Evaluation Test',code:'MET',description:'Full evaluation for your child',icon:'ЁЯОп'}],
      Corporate:[{name:'SAT тАУ Skills Assessment Test',code:'SAT',description:'Professional skills analysis',icon:'тЪЩя╕П'},{name:'MAT тАУ Management Aptitude Test',code:'MAT',description:'Leadership and management test',icon:'ЁЯУИ'},{name:'GAT тАУ General Aptitude Test',code:'GAT',description:'Comprehensive aptitude assessment',icon:'ЁЯФм'}]
    };
    svcs=defaults[cat]||[];
  }
  const items=svcs.length?svcs.map(s=>{
    const safeName=(s.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const code=(s.name||s.code||'').split('тАУ')[0].trim();
    const desc=(s.name||'').includes('тАУ')?(s.name.split('тАУ')[1]||'').trim():s.description||'';
    return `<div class="test-item" onclick="pickTest('${safeName}',this)">
      <div class="test-icon">${s.icon||testIconMap[s.code]||'ЁЯУЛ'}</div>
      <div><div class="test-name">${code}</div><div class="test-desc">${desc}</div></div>
      <div class="test-arrow">тА║</div>
    </div>`;
  }).join('')
  :`<div style="color:var(--ink3);font-size:13px;padding:8px 0">No tests found for ${cat}</div>`;
  cardWrap(`<div class="wa-card"><div class="wc-header">ЁЯзк Choose Your Test</div><div class="wc-body">${items}</div></div>`);
}

async function pickTest(name, el){
  document.querySelectorAll('.test-item').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.5';});
  el.style.opacity='1'; el.classList.add('sel');
  S.test_name=name;
  const code=name.split('тАУ')[0].trim();
  userMsg(code);
  const t=showTyping(); await new Promise(r=>setTimeout(r,500)); t.remove();
  showModeStep();
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 3 тАФ MODE
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showModeStep(){
  await botMsg('How would you like to attend? ЁЯСЗ',200);
  cardWrap(`<div class="wa-card"><div class="wc-header">ЁЯУб Consultation Mode</div><div class="wc-body">
    <div class="mode-grid">
      <div class="mode-item online" onclick="pickMode('Online',this)">
        <div class="mi-badge">Meet</div>
        <div class="mi-icon">ЁЯТ╗</div><div class="mi-name">Online</div>
        <div class="mi-price">тВ╣100</div>
        <div class="mi-desc">Video session, Meet link sent after booking</div>
      </div>
      <div class="mode-item offline" onclick="pickMode('Offline',this)">
        <div class="mi-badge">Walk-in</div>
        <div class="mi-icon">ЁЯУН</div><div class="mi-name">Offline</div>
        <div class="mi-price">FREE</div>
        <div class="mi-desc">Visit nearest Brain Checker centre</div>
      </div>
    </div>
  </div></div>`);
}

async function pickMode(mode, el){
  document.querySelectorAll('.mode-item').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.5';});
  el.style.opacity='1'; el.classList.add('sel');
  S.mode=mode; S.franchise_id=null; S.franchise_name=''; S.franchise_address='';
  userMsg(mode==='Online'?'ЁЯТ╗ Online тАФ тВ╣100':'ЁЯУН Offline тАФ FREE');

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 4 тАФ SCHEDULE
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showScheduleStep(){
  await botMsg('Pick your preferred date ЁЯУЕ',200);
  // load slots for next 7 days
  const today=new Date(); const dates=[];
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()+i);dates.push(d.toISOString().split('T')[0]);}
  await Promise.all(dates.map(async ds=>{
    const r=await fetch('/api/slots?date='+ds);const d=await r.json();
    slotsByDate[ds]=d.slots;
  }));
  const chips=dates.map((ds,i)=>{
    const d=new Date(ds); const cnt=(slotsByDate[ds]||[]).length;
    const full=cnt===0;
    return `<div class="dc${full?' full':''}" onclick="${full?'':'pickDate(\''+ds+'\',this)'}">
      <div class="d-day">${i===0?'Today':i===1?'Tmrw':d.toLocaleDateString('en-IN',{weekday:'short'})}</div>
      <div class="d-num">${d.getDate()}</div>
      <div class="d-mon">${d.toLocaleDateString('en-IN',{month:'short'})}</div>
      <div class="d-cnt">${full?'Full':cnt+' free'}</div>
    </div>`;
  }).join('');
  cardWrap(`<div class="wa-card"><div class="wc-header">ЁЯУЕ Select Date</div><div class="wc-body"><div class="date-strip" id="date-strip">${chips}</div></div></div>`);
}

async function pickDate(ds, el){
  document.querySelectorAll('.dc').forEach(c=>{c.classList.remove('sel');});
  el.classList.add('sel');
  S.booking_date=ds; S.slot_id=null; S.slot_time='';
  const fmt=new Date(ds).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  userMsg('ЁЯУЕ '+fmt);
  const t=showTyping(); await new Promise(r=>setTimeout(r,400)); t.remove();
  showSlots(ds);
}

async function showSlots(ds){
  const slots=slotsByDate[ds]||[];
  if(!slots.length){await botMsg('No slots available for this date. Please pick another.'); return;}
  await botMsg('Choose a time slot тП░',200);
  const chips=slots.map(s=>`<div class="sc" onclick="pickSlot(${s.id},'${s.slot_time}',this)">${s.slot_time}</div>`).join('');
  cardWrap(`<div class="wa-card"><div class="wc-header">ЁЯХР Available Slots</div><div class="wc-body"><div class="slot-grid-wa">${chips}</div></div></div>`);
}

async function pickSlot(id,time,el){
  document.querySelectorAll('.sc').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.5';});
  el.style.opacity='1'; el.classList.add('sel');
  S.slot_id=id; S.slot_time=time;
  userMsg('тП░ '+time);
  const t=showTyping(); await new Promise(r=>setTimeout(r,400)); t.remove();
  if(S.mode==='Offline'){
    showFranchiseStep();
  } else {
    showConfirmStep();
  }
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  FRANCHISE (offline only)
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showFranchiseStep(){
  if(!allFr.length){const r=await fetch('/api/franchises');const d=await r.json();allFr=d.franchises;}
  await botMsg('Select your nearest franchise centre ЁЯПв',200);
  buildFrList(null);
}

function buildFrList(nearId){
  // remove old fr cards
  document.querySelectorAll('.fr-wa-card-row').forEach(e=>e.remove());
  const items=allFr.map(f=>`
    <div class="fr-wa-item${nearId===f.id?' near':''}" id="fr-${f.id}" onclick="pickFr(${f.id},this)">
      <div class="fr-icon-wa">ЁЯПв</div>
      <div><div class="fr-nm">${f.name}${nearId===f.id?'<span class="near-tag">Nearest</span>':''}</div><div class="fr-ad">${f.address}</div></div>
      <div class="fr-arr">тА║</div>
    </div>`).join('');
  const wrap=cardWrap(`<div class="wa-card">
    <div class="wc-header">ЁЯУН Select Franchise</div>
    <div class="wc-body">
      <div class="loc-bar"><span>ЁЯУб</span><span id="loc-txt">Auto-detect nearest centre</span><button class="lb-btn" onclick="detectLoc()">Detect</button></div>
      ${items}
    </div>
  </div>`);
  wrap.parentElement.classList.add('fr-wa-card-row');
}

async function detectLoc(){
  const btn=document.querySelector('.lb-btn'), txt=document.getElementById('loc-txt');
  btn.textContent='DetectingтАж'; btn.disabled=true;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    const {latitude:la,longitude:ln}=pos.coords;
    const dist=(f)=>Math.sqrt((la-f.lat)**2+(ln-f.lng)**2);
    const near=allFr.reduce((p,c)=>dist(c)<dist(p)?c:p);
    txt.textContent='ЁЯУН Nearest: '+near.name; btn.textContent='тЬЕ'; btn.disabled=true;
    buildFrList(near.id);
    S.franchise_id=near.id; S.franchise_name=near.name; S.franchise_address=near.address;
    document.querySelector(`#fr-${near.id}`)?.classList.add('sel');
  }catch(e){txt.textContent='Denied тАФ select manually'; btn.textContent='Retry'; btn.disabled=false;}
}

async function pickFr(id, el){
  document.querySelectorAll('.fr-wa-item').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.5';});
  el.style.opacity='1'; el.classList.add('sel');
  const fr=allFr.find(f=>f.id===id);
  S.franchise_id=fr.id; S.franchise_name=fr.name; S.franchise_address=fr.address;
  userMsg('ЁЯПв '+fr.name);
  const t=showTyping(); await new Promise(r=>setTimeout(r,400)); t.remove();
  showConfirmStep();
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
//  STEP 5 тАФ CONFIRM / PAY
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function showConfirmStep(){
  if(S.mode==='Online'){
    await botMsg('Almost done! Please complete the payment of <strong>тВ╣100</strong> ЁЯТ│',200);
    showPaymentCard();
  } else {
    await botMsg('Please review your booking details тЬЕ',200);
    showReviewCard();
  }
}

function showPaymentCard(){
  const bdate=new Date(S.booking_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const rows=buildSummaryRows(bdate);
  cardWrap(`<div class="wa-card">
    <div class="wc-header">ЁЯТ│ Payment & Confirmation</div>
    <div class="wc-body">
      <div class="sum-wa">${rows}</div>
      <div style="margin:12px 0 8px;border-top:1px solid var(--border);padding-top:12px">
        <div class="amt-row"><span>Amount Due</span><strong>тВ╣100</strong></div>
        <div class="pay-grid-wa">
          <div class="pay-item sel" onclick="pickPay('UPI',this)"><div class="pi-icon">ЁЯУ▒</div><div class="pi-name">UPI/QR</div></div>
          <div class="pay-item" onclick="pickPay('Card',this)"><div class="pi-icon">ЁЯТ│</div><div class="pi-name">Card</div></div>
          <div class="pay-item" onclick="pickPay('NetBanking',this)"><div class="pi-icon">ЁЯПж</div><div class="pi-name">Net Banking</div></div>
        </div>
        <div class="qr-section-wa" id="qr-wa">
          <img src="/static/qr.jpeg" alt="UPI QR"/>
          <div><div class="upi-pill"><span>shivamdhote5852@oki</span><button onclick="navigator.clipboard.writeText('shivamdhote5852@oki');this.textContent='тЬЕ'">ЁЯУЛ</button></div></div>
        </div>
      </div>
      <button class="wa-send-btn" id="btn-confirm" onclick="submitBooking()">тЬЕ Confirm & Book</button>
    </div>
  </div>`);
}

function showReviewCard(){
  const bdate=new Date(S.booking_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const rows=buildSummaryRows(bdate);
  cardWrap(`<div class="wa-card">
    <div class="wc-header">ЁЯУЛ Review Booking</div>
    <div class="wc-body">
      <div class="sum-wa">${rows}</div>
      <button class="wa-send-btn" style="margin-top:14px" id="btn-confirm" onclick="submitBooking()">тЬЕ Confirm Booking тАФ FREE</button>
    </div>
  </div>`);
}

function buildSummaryRows(bdate){
  const arr=[['Name',S.name],['Phone',S.phone],['Category',S.category],['Test',S.test_name.split('тАУ')[0].trim()],['Mode',S.mode],['Date',bdate],['Time',S.slot_time]];
  if(S.mode==='Offline') arr.push(['Centre',S.franchise_name]);
  arr.push(['Amount',S.mode==='Online'?'тВ╣100':'FREE тЬЕ']);
  return arr.map(([l,v])=>`<div class="sr"><span class="sl">${l}</span><span class="sv${v==='FREE тЬЕ'?' g':v==='тВ╣100'?' t':''}">${v}</span></div>`).join('');
}

function pickPay(m,el){
  document.querySelectorAll('.pay-item').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel'); S.payment_method=m;
  document.getElementById('qr-wa').style.display=m==='UPI'?'block':'none';
}

async function submitBooking(){
  const btn=document.getElementById('btn-confirm');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> BookingтАж';
  try{
    const r=await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:S.name,email:S.email,phone:S.phone,city:S.city,
      category:S.category,test_name:S.test_name,mode:S.mode,
      franchise_id:S.franchise_id,booking_date:S.booking_date,
      slot_id:S.slot_id,slot_time:S.slot_time,payment_method:S.payment_method
    })});
    const d=await r.json();
    if(!d.ok){
      btn.disabled=false; btn.textContent='Try Again';
      await botMsg('тЪая╕П '+(d.errors?.slot_id||'Something went wrong. Please try again.'));
      return;
    }
    showBookingConfirmation(d);
  }catch(e){
    btn.disabled=false; btn.textContent='Retry';
    await botMsg('тЪая╕П Connection error. Please try again.');
  }
}

async function showBookingConfirmation(d){
  // lock all cards
  document.querySelectorAll('.wa-card input,.wa-card button,.wa-card .cat-item,.wa-card .test-item,.wa-card .mode-item,.wa-card .sc,.wa-card .dc,.wa-card .fr-wa-item,.wa-card .pay-item').forEach(e=>{e.style.pointerEvents='none';e.disabled=true;});
  userMsg('Booking confirmed! ЁЯОЙ');
  const t=showTyping(); await new Promise(r=>setTimeout(r,700)); t.remove();
  await botMsg(`ЁЯе│ <strong>Booking Confirmed, ${d.name}!</strong>`);
  const meet_html=d.meet_link?`
    <div class="meet-pill">
      <h4>ЁЯОе Your Google Meet Link</h4>
      <div class="ml"><span>${d.meet_link}</span><button onclick="navigator.clipboard.writeText('${d.meet_link}');this.textContent='тЬЕ'">ЁЯУЛ</button></div>
      <button class="join-wa-btn" onclick="window.open('${d.meet_link}','_blank')">ЁЯОе Join Google Meet</button>
    </div>`:'';
  const venue_html=d.franchise_name?`
    <div class="venue-pill">
      <h4>ЁЯУН Your Venue</h4>
      <p style="font-weight:700;margin-bottom:4px">${d.franchise_name}</p>
      <p>${d.franchise_address}</p>
    </div>`:'';
  cardWrap(`<div class="wa-card">
    <div class="wc-header" style="background:#25d366">тЬЕ Booking Confirmed!</div>
    <div class="wc-body">
      <div class="confirm-wa">
        <div class="ck-icon">ЁЯОК</div>
        <h3>You're all set!</h3>
        <p>ЁЯУЕ ${d.booking_date} &nbsp;тП░ ${d.slot_time}</p>
      </div>
      ${meet_html}
      ${venue_html}
      <div class="share-wa-row">
        <button class="sh-wa wa" onclick="window.open('${d.whatsapp_url}','_blank')">ЁЯУ▒ WhatsApp</button>
        <button class="sh-wa sh-mail" onclick="window.open('${d.mailto_url}','_blank')">тЬЙя╕П Email</button>
      </div>
      <button class="new-book-btn" onclick="newBooking()">+ New Booking</button>
    </div>
  </div>`);
  TI.disabled=true;
  document.getElementById('send-fab').style.opacity='.4';
  document.getElementById('send-fab').style.pointerEvents='none';
}

async function newBooking(){
  // reset state
  Object.assign(S,{step:0,name:'',email:'',phone:'',city:'',category:'',test_name:'',mode:'',franchise_id:null,franchise_name:'',franchise_address:'',booking_date:'',slot_id:null,slot_time:'',payment_method:'UPI'});
  // clear chat
  CA.innerHTML='<div class="date-divider"><span id="today-label"></span></div>';
  TI.disabled=false;
  document.getElementById('send-fab').style.opacity='';
  document.getElementById('send-fab').style.pointerEvents='';
  startFlow();
}

// тФАтФА TEXT INPUT тФАтФА
TI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendText();}});
function sendText(){
  const v=TI.value.trim(); if(!v) return;
  TI.value='';
  userMsg(v);
  setTimeout(()=>botMsg('Please use the options above to continue your booking ЁЯШК'),400);
}

// тФАтФА THEME тФАтФА
function toggleTheme(){
  const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-btn').textContent=d?'ЁЯМЩ':'тШАя╕П';
  localStorage.setItem('bc-theme',d?'light':'dark');
}
(()=>{
  const t=localStorage.getItem('bc-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  const b=document.getElementById('theme-btn');
  if(b) b.textContent=t==='dark'?'тШАя╕П':'ЁЯМЩ';
})();

    }

    allCats=[{name:'Student',icon:'ЁЯОУ'},{name:'Parent',icon:'ЁЯСитАНЁЯСйтАНЁЯСз'},{name:'Corporate',icon:'ЁЯТ╝'}];
  }
  startFlow();
})();
</script>
