<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — Brain Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f4f6f9;--surface:#fff;--border:#e5e7eb;--ink:#111827;--ink3:#6b7280;--teal:#0d9488;--teal-l:#ccfbf1;--teal-d:#0f766e;--rose:#f43f5e;--rose-l:#fff1f2;}
[data-theme="dark"]{--bg:#0f172a;--surface:#1e293b;--border:#334155;--ink:#f1f5f9;--ink3:#94a3b8;--teal-l:rgba(13,148,136,.15);--rose-l:rgba(244,63,94,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.logo-wrap{text-align:center;margin-bottom:24px;}
.logo-wrap img{height:50px;margin-bottom:12px;}
.logo-wrap h2{font-size:15px;font-weight:800;color:var(--ink);}
.logo-wrap p{font-size:12px;color:var(--ink3);}
.lock{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--teal-d));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px;box-shadow:0 4px 16px rgba(13,148,136,.25);}
label{display:block;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:.2s;margin-bottom:16px;}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1);}
.btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.9;}
.err{background:var(--rose-l);border:1px solid rgba(244,63,94,.25);border-radius:10px;padding:11px 14px;color:var(--rose);font-size:13px;margin-bottom:16px;text-align:center;}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--ink3);text-decoration:none;}
.back:hover{color:var(--teal);}
.hint{font-size:11px;color:var(--ink3);text-align:center;margin-top:14px;opacity:.6;}
.theme-btn{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;}
</style>
</head>
<body>
<button class="theme-btn" id="tb" onclick="toggleTheme()">🌙</button>
<div class="card">
  <div class="logo-wrap"><img src="/static/logo.png" alt="Brain Checker"/><h2>Admin Portal</h2><p>Company counselors only</p></div>
  <div class="lock">🔐</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label><input type="text" name="u" placeholder="admin" autocomplete="off" required/>
    <label>Password</label><input type="password" name="p" placeholder="••••••••" required/>
    <button type="submit" class="btn">🔓 Login to Admin Panel</button>
  </form>
  <a href="/" class="back">← Back to Booking Page</a>
  <div class="hint">Default: admin / brain@2026</div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('tb').textContent=d?'🌙':'☀️';localStorage.setItem('bc-theme',d?'light':'dark');}
const t=localStorage.getItem('bc-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('tb').textContent=t==='dark'?'☀️':'🌙';
</script>
</body>
</html>
